<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MockMode — Character Test</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080810;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'VT323', monospace;
      padding: 2rem;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(to bottom, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
      pointer-events: none;
      z-index: 100;
    }

    /* ── Splash ── */
    #splash {
      position: fixed;
      inset: 0;
      background: #080810;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }
    #splash h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(16px, 3.5vw, 26px);
      color: #aaaaff;
      text-align: center;
      line-height: 1.8;
      text-shadow: 0 0 20px rgba(100,100,255,0.5);
    }
    #splash p {
      font-family: 'VT323', monospace;
      font-size: 22px;
      color: #4444aa;
      text-align: center;
      max-width: 420px;
    }
    #start-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      background: #16162a;
      border: 2px solid #6666cc;
      color: #ccccff;
      padding: 1rem 2.5rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      animation: pulse-btn 2s ease-in-out infinite;
    }
    #start-btn:hover { background: #22223a; color: #fff; }
    #start-btn:disabled { opacity: 0.4; cursor: not-allowed; animation: none; }
    @keyframes pulse-btn {
      0%, 100% { box-shadow: 0 0 8px rgba(100,100,255,0.3); }
      50%       { box-shadow: 0 0 24px rgba(100,100,255,0.7); }
    }

    /* ── Game screen ── */
    .game-screen {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 1rem;
      background: #0f0f1a;
      border: 2px solid #2a2a5a;
      border-bottom: none;
    }
    .hud-label { font-size: 14px; color: #4444aa; letter-spacing: 0.1em; }
    .stress-wrap { display: flex; align-items: center; gap: 0.5rem; }
    .stress-label { font-size: 14px; color: #4444aa; }
    .stress-bar { width: 120px; height: 10px; background: #111; border: 1px solid #2a2a5a; border-radius: 2px; overflow: hidden; }
    .stress-fill { height: 100%; width: 30%; background: #1aff7a; transition: width 0.5s ease, background 0.5s ease; border-radius: 2px; }

    .scene {
      background: #0c0c18;
      border: 2px solid #2a2a5a;
      padding: 2rem 2rem 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .floor { width: 100%; height: 2px; background: linear-gradient(to right, transparent, #2a2a5a 20%, #2a2a5a 80%, transparent); }
    .character-stage { display: flex; align-items: flex-end; justify-content: center; gap: 3rem; width: 100%; padding-bottom: 0.5rem; }
    .character-slot { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
    .character-name { font-size: 16px; color: #6666cc; letter-spacing: 0.08em; }

    svg.char { width: 100px; height: 140px; filter: drop-shadow(0 0 12px rgba(80,80,200,0.3)); }

    @keyframes idle-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    @keyframes blink-eyes { 0%, 88%, 100% { transform: scaleY(1); } 92% { transform: scaleY(0.05); } }
    @keyframes pixel-glitch {
      0%, 95%, 100% { transform: translateX(0); opacity: 1; }
      96% { transform: translateX(-3px); opacity: 0.8; }
      97% { transform: translateX(3px); opacity: 0.9; }
      98% { transform: translateX(0); opacity: 1; }
    }
    .char-group { animation: idle-float 3s ease-in-out infinite, pixel-glitch 8s steps(1) infinite; }
    .eye-l { transform-origin: 35px 48px; animation: blink-eyes 5s ease-in-out infinite; }
    .eye-r { transform-origin: 55px 48px; animation: blink-eyes 5s ease-in-out 0.05s infinite; }

    .dialogue-section { width: 100%; }
    .dialogue-nametag {
      display: inline-block;
      background: #0f0f1a;
      border: 2px solid #2a2a5a;
      border-bottom: none;
      padding: 4px 16px;
      font-size: 16px;
      color: #aaaaff;
      letter-spacing: 0.1em;
    }
    .dialogue-box {
      background: #0a0a14;
      border: 2px solid #2a2a5a;
      padding: 1.25rem 1.5rem 1rem;
      min-height: 100px;
      position: relative;
      width: 100%;
    }
    #dialogue-text { font-size: 22px; line-height: 1.5; color: #ddddff; min-height: 66px; }
    .dialogue-cursor {
      display: inline-block;
      width: 10px; height: 18px;
      background: #6666cc;
      vertical-align: middle;
      margin-left: 2px;
      animation: blink-cursor 0.8s steps(1) infinite;
    }
    @keyframes blink-cursor { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .dialogue-arrow {
      position: absolute;
      bottom: 10px; right: 14px;
      font-size: 14px; color: #4444aa;
      animation: bounce-arrow 1s ease-in-out infinite;
    }
    @keyframes bounce-arrow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(3px); } }

    .reaction {
      position: absolute;
      top: -48px; right: 20px;
      background: #0f0f1a;
      border: 2px solid #2a2a5a;
      padding: 4px 12px;
      font-size: 18px; color: #aaaaff;
      display: none;
      border-radius: 2px;
    }
    .reaction.visible { display: block; }

    .answer-section {
      background: #0f0f1a;
      border: 2px solid #2a2a5a;
      border-top: none;
      padding: 1rem 1.5rem;
      width: 100%;
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      background: #080810;
      border: 1px solid #2a2a5a;
      color: #ccccff;
      font-family: 'VT323', monospace;
      font-size: 20px;
      padding: 0.5rem 0.75rem;
      resize: none;
      height: 64px;
      outline: none;
      border-radius: 2px;
      line-height: 1.4;
    }
    textarea:focus { border-color: #5555bb; }
    textarea::placeholder { color: #333355; }

    button {
      background: #16162a;
      border: 2px solid #4444aa;
      color: #aaaaff;
      font-family: 'VT323', monospace;
      font-size: 20px;
      padding: 0.5rem 1.25rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    button:hover   { background: #20203a; color: #ccccff; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    .bottom-bar {
      display: flex;
      justify-content: space-between;
      padding: 0.4rem 1rem;
      background: #0a0a14;
      border: 2px solid #2a2a5a;
      border-top: 1px solid #1a1a3a;
    }
    .bottom-label { font-size: 13px; color: #333355; letter-spacing: 0.08em; }
  </style>
</head>
<body>

<!-- Splash — needed so Chrome allows TTS (requires user gesture) -->
<div id="splash">
  <h1>MOCKMODE<br><span style="color:#6666cc;font-size:0.6em">CHARACTER TEST</span></h1>
  <p>You are about to be interviewed by ALEX — a ruthless Technical Lead.<br>Good luck. You will need it.</p>
  <button id="start-btn" onclick="startInterview()">&#x25B6; BEGIN INTERVIEW</button>
</div>

<div class="game-screen">

  <div class="hud">
    <span class="hud-label">&#x25B6; MOCKMODE v1.0</span>
    <div class="stress-wrap">
      <span class="stress-label">STRESS</span>
      <div class="stress-bar"><div class="stress-fill" id="stress-fill"></div></div>
    </div>
    <span class="hud-label" id="q-counter">Q 1 / 5</span>
  </div>

  <div class="scene">
    <div class="character-stage">
      <div class="character-slot">
        <span class="character-name">ALEX</span>
        <svg class="char" viewBox="0 0 90 130" xmlns="http://www.w3.org/2000/svg">
          <g class="char-group">
            <rect x="18" y="78" width="54" height="48" rx="4" fill="#13132a"/>
            <rect x="38" y="78" width="14" height="48" fill="#0a0a18"/>
            <polygon points="45,82 42,90 45,112 48,90" fill="#3333cc"/>
            <polygon points="38,78 24,88 36,98" fill="#0f0f22"/>
            <polygon points="52,78 66,88 54,98" fill="#0f0f22"/>
            <rect x="39" y="76" width="12" height="7" rx="2" fill="#ddd8c0"/>
            <rect x="39" y="64" width="12" height="16" rx="4" fill="#c8b89a"/>
            <rect x="22" y="30" width="46" height="40" rx="10" fill="#c8b89a"/>
            <rect x="22" y="30" width="46" height="14" rx="9" fill="#111008"/>
            <rect x="22" y="30" width="10" height="22" rx="3" fill="#111008"/>
            <rect x="26" y="48" width="14" height="9" rx="2" fill="none" stroke="#222" stroke-width="1.5"/>
            <rect x="50" y="48" width="14" height="9" rx="2" fill="none" stroke="#222" stroke-width="1.5"/>
            <line x1="40" y1="52" x2="50" y2="52" stroke="#222" stroke-width="1.5"/>
            <line x1="26" y1="52" x2="22" y2="50" stroke="#222" stroke-width="1.5"/>
            <line x1="64" y1="52" x2="68" y2="50" stroke="#222" stroke-width="1.5"/>
            <ellipse class="eye-l" cx="33" cy="52" rx="4" ry="4" fill="#0a0a18"/>
            <ellipse class="eye-r" cx="57" cy="52" rx="4" ry="4" fill="#0a0a18"/>
            <circle cx="34" cy="52" r="1.5" fill="#8888ff"/>
            <circle cx="58" cy="52" r="1.5" fill="#8888ff"/>
            <ellipse cx="45" cy="58" rx="2" ry="1.5" fill="#b8a88a"/>
            <rect id="mouth" x="36" y="63" width="18" height="4" rx="2" fill="#7a5a4a"/>
            <rect x="4"  y="80" width="16" height="34" rx="7" fill="#13132a"/>
            <rect x="70" y="80" width="16" height="34" rx="7" fill="#13132a"/>
            <ellipse cx="12"  cy="116" rx="8" ry="6" fill="#c8b89a"/>
            <ellipse cx="78" cy="116" rx="8" ry="6" fill="#c8b89a"/>
            <rect x="20" y="112" width="50" height="16" rx="3" fill="#1a1a2e"/>
            <rect x="22" y="114" width="46" height="12" rx="2" fill="#080818"/>
            <rect x="24" y="116" width="24" height="2" rx="1" fill="#3333cc" opacity="0.9"/>
            <rect x="24" y="120" width="16" height="1" rx="1" fill="#3333cc" opacity="0.5"/>
            <rect x="24" y="123" width="20" height="1" rx="1" fill="#3333cc" opacity="0.3"/>
          </g>
        </svg>
      </div>
    </div>

    <div class="floor"></div>

    <div class="dialogue-section" style="position:relative;">
      <div class="reaction" id="reaction-box">😐 hmm...</div>
      <div class="dialogue-nametag">&#x25B6; ALEX — TECH LEAD</div>
      <div class="dialogue-box">
        <p id="dialogue-text"><span class="dialogue-cursor"></span></p>
        <span class="dialogue-arrow">&#x25BC;</span>
      </div>
    </div>
  </div>

  <div class="answer-section">
    <textarea id="answer-input" placeholder="Type your answer..."></textarea>
    <button id="submit-btn" onclick="submitAnswer()">&#x25B6; SUBMIT</button>
  </div>

  <div class="bottom-bar">
    <span class="bottom-label">MOCKMODE &copy; 2025</span>
    <span class="bottom-label" id="status-label">READY</span>
    <span class="bottom-label">&#x2665; &#x2665; &#x2665;</span>
  </div>

</div>

<!-- Your existing AI module — same path as the real pages use -->
<script src="assets/js/main.js"></script>
<script src="assets/js/ai.js"></script>

<script>
  // Fallback definitions in case main.js path fails to resolve
  if (typeof getFromStorage === 'undefined') {
    console.warn('[MockMode] main.js not loaded — using inline fallbacks.');
    window.getFromStorage = (key) => {
      try { const r = localStorage.getItem(`mm_${key}`); return r !== null ? JSON.parse(r) : null; } catch { return null; }
    };
    window.saveToStorage = (key, value) => {
      try { localStorage.setItem(`mm_${key}`, JSON.stringify(value)); } catch {}
    };
    window.showLoader = (msg) => { console.log('[loader]', msg); };
    window.hideLoader = () => {};
    window.showToast  = (msg, type) => { console.log(`[toast:${type}]`, msg); };
    window.navigateTo = (page) => { window.location.href = page; };
  }
  if (typeof generateQuestions === 'undefined') {
    console.warn('[MockMode] ai.js not loaded — AI calls will use fallback questions only.');
  }
</script>

<script>
  // ── DOM ───────────────────────────────────────────────────────────────────
  const mouthEl    = document.getElementById('mouth');
  const dialogueEl = document.getElementById('dialogue-text');
  const stressFill = document.getElementById('stress-fill');
  const qCounter   = document.getElementById('q-counter');
  const statusEl   = document.getElementById('status-label');
  const submitBtn  = document.getElementById('submit-btn');
  const reactionEl = document.getElementById('reaction-box');
  const splashEl   = document.getElementById('splash');

  // ── State ─────────────────────────────────────────────────────────────────
  let qIndex   = 0;
  let stress   = 30;
  let talking  = false;
  let talkTimer = null;
  let QUESTIONS = [];
  let scores    = [];

  // Use main.js getFromStorage — reads mm_ prefixed keys automatically
  // If no resume in storage, inject a mock one so this test page works standalone
  const MOCK_RESUME = `Jane Doe — Software Engineer
  Skills: JavaScript, TypeScript, React, Node.js, Python, PostgreSQL, Docker, Git
  Experience:
    - Frontend Engineer at TechCorp (2022–present): Built React dashboards, improved page load by 40%, led a team of 3.
    - Junior Developer at StartupXYZ (2020–2022): Full-stack PHP/MySQL, REST APIs, Agile sprints.
  Education: BS Computer Science, State University, 2020
  Projects: Open-source CLI tool (800+ GitHub stars), personal finance tracker app (React + Firebase)
  Certifications: AWS Cloud Practitioner`;

  if (!getFromStorage('resume')) {
    saveToStorage('resume', MOCK_RESUME);
    console.log('[MockMode] No resume found — injected mock resume for testing.');
  }

  const RESUME      = getFromStorage('resume');
  const PERSONALITY = getFromStorage('personality') || 'technical';
  const ROLE        = getFromStorage('role')        || 'developer';

  console.log('[MockMode] Resume loaded (' + RESUME.length + ' chars), personality: ' + PERSONALITY + ', role: ' + ROLE);

  // ── Web Speech API ────────────────────────────────────────────────────────
  const synth = window.speechSynthesis;
  let voice = null;

  function pickVoice() {
    const voices = synth.getVoices();
    const want = ['Google UK English Male','Microsoft David Desktop','Microsoft Mark Desktop','Alex','Daniel'];
    for (const name of want) {
      const v = voices.find(v => v.name === name);
      if (v) return v;
    }
    return voices.find(v => v.lang.startsWith('en')) || voices[0] || null;
  }

  if (synth.onvoiceschanged !== undefined) {
    synth.onvoiceschanged = () => { voice = pickVoice(); };
  }

  function speakText(text, onDone) {
    synth.cancel();
    if (!window.SpeechSynthesisUtterance) { onDone?.(); return; }
    if (!voice) voice = pickVoice();

    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.9; u.pitch = 0.82; u.volume = 1;
    if (voice) u.voice = voice;

    u.onstart = () => startTalking();
    u.onend   = () => { stopTalking(); onDone?.(); };
    u.onerror = (e) => {
      if (e.error !== 'interrupted' && e.error !== 'canceled')
        console.warn('TTS:', e.error);
      stopTalking(); onDone?.();
    };
    synth.speak(u);
  }

  // ── Splash / start ────────────────────────────────────────────────────────
  async function startInterview() {
    const btn = document.getElementById('start-btn');
    btn.disabled = true;
    btn.textContent = '⏳ GENERATING QUESTIONS...';

    // Unlock TTS with a silent utterance (satisfies Chrome gesture requirement)
    const unlock = new SpeechSynthesisUtterance('');
    unlock.volume = 0;
    synth.speak(unlock);
    voice = pickVoice();

    statusEl.textContent = 'LOADING AI...';

    try {
      // Use your existing generateQuestions from assets/js/ai.js
      QUESTIONS = await generateQuestions(RESUME, PERSONALITY, ROLE);
      if (!QUESTIONS || !QUESTIONS.length) throw new Error('empty');
    } catch (e) {
      console.warn('generateQuestions failed, using fallback', e);
      QUESTIONS = [
        "Walk me through your most recent project and your role in it.",
        "What's the hardest technical problem you've solved, and how?",
        "How do you approach debugging something you've never seen before?",
        "Tell me about a time you disagreed with a teammate. What happened?",
        "Where do you see yourself in 3 years?",
      ];
    }

    // Fade out splash
    splashEl.style.transition = 'opacity 0.4s';
    splashEl.style.opacity = '0';
    setTimeout(() => { splashEl.style.display = 'none'; }, 400);

    setTimeout(askNext, 500);
  }

  // ── Game loop ─────────────────────────────────────────────────────────────
  function askNext() {
    if (qIndex >= QUESTIONS.length) {
      const end = "Interview complete. We'll be in touch... or not.";
      typeText(end);
      speakText(end, () => { statusEl.textContent = 'DONE'; });
      return;
    }

    qCounter.textContent = `Q ${qIndex + 1} / ${QUESTIONS.length}`;
    statusEl.textContent = 'ALEX IS SPEAKING';
    submitBtn.disabled = true;
    reactionEl.classList.remove('visible');

    const q = QUESTIONS[qIndex];
    typeText(q);
    // Speak the question; enable input only when speech finishes
    speakText(q, () => {
      submitBtn.disabled = false;
      statusEl.textContent = 'YOUR TURN';
      document.getElementById('answer-input').focus();
    });
  }

  function typeText(text) {
    dialogueEl.innerHTML = '';
    let i = 0;
    function step() {
      if (i < text.length) {
        dialogueEl.textContent += text[i++];
        setTimeout(step, 20 + Math.random() * 16);
      } else {
        dialogueEl.innerHTML += '<span class="dialogue-cursor"></span>';
      }
    }
    step();
  }

  // ── Mouth animation (driven by TTS start/end, not typewriter) ────────────
  function startTalking() {
    talking = true;
    let t = 0;
    function animate() {
      if (!talking) { mouthEl.setAttribute('height','4'); mouthEl.setAttribute('y','63'); return; }
      const h = 4 + Math.abs(Math.sin(t * 0.45)) * 10;
      mouthEl.setAttribute('height', h);
      mouthEl.setAttribute('y', 63 - (h - 4) * 0.5);
      t++;
      talkTimer = requestAnimationFrame(animate);
    }
    animate();
  }

  function stopTalking() {
    talking = false;
    cancelAnimationFrame(talkTimer);
    mouthEl.setAttribute('height', '4');
    mouthEl.setAttribute('y', '63');
  }

  // ── Submit + AI evaluation ────────────────────────────────────────────────
  async function submitAnswer() {
    const answer = document.getElementById('answer-input').value.trim();
    if (!answer) return;

    synth.cancel();
    document.getElementById('answer-input').value = '';
    submitBtn.disabled = true;
    statusEl.textContent = 'ALEX IS THINKING...';
    reactionEl.textContent = '⏳ evaluating...';
    reactionEl.classList.add('visible');

    let result;
    try {
      // Use your existing evaluateAnswer from assets/js/ai.js
      result = await evaluateAnswer(QUESTIONS[qIndex], answer, PERSONALITY, ROLE);
    } catch (e) {
      console.warn('evaluateAnswer failed', e);
      result = { reaction: 'Hmm. Noted.', mood_emoji: '😐', score: 50, stress_increase: 5, feedback: 'Could be stronger.' };
    }

    scores.push(result.score ?? 50);

    // Show reaction bubble
    reactionEl.textContent = `${result.mood_emoji ?? '😐'} ${result.reaction}`;

    // Show feedback in status bar
    statusEl.textContent = result.feedback ?? '';

    // Update stress
    stress = Math.min(100, stress + (result.stress_increase ?? 5));
    updateStress(stress);

    qIndex++;

    // Speak reaction, wait for it to finish, THEN move to next question
    speakText(result.reaction, () => {
      setTimeout(askNext, 1200);
    });
  }

  function updateStress(val) {
    stressFill.style.width = val + '%';
    stressFill.style.background = val < 40 ? '#1aff7a' : val < 70 ? '#ffcc00' : '#ff4444';
  }

  document.getElementById('answer-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitAnswer(); }
  });
</script>

</body>
</html>
