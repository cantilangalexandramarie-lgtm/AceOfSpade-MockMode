<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RETRO_OS - Interview Room</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
          "tertiary-fixed-dim": "#a0cfcf",
          "tertiary-container": "#1d4d4d",
          "on-error": "#690005",
          "secondary": "#cfc6ae",
          "surface-bright": "#493431",
          "inverse-on-surface": "#402b28",
          "secondary-container": "#4f4936",
          "primary-fixed-dim": "#e7bdb6",
          "surface-dim": "#1f0f0c",
          "secondary-fixed": "#ece2c9",
          "on-primary-fixed": "#2c1511",
          "primary-container": "#5d3f3a",
          "on-secondary-fixed-variant": "#4c4634",
          "on-background": "#fcdbd6",
          "tertiary-fixed": "#bbeceb",
          "outline-variant": "#504442",
          "surface-container-high": "#382522",
          "on-tertiary-fixed": "#002020",
          "error": "#ffb4ab",
          "surface-tint": "#e7bdb6",
          "on-secondary": "#35301f",
          "inverse-primary": "#775651",
          "surface": "#1f0f0c",

          "on-primary-fixed-variant": "#5d3f3a",
          "on-tertiary-container": "#8ebdbc",
          "on-primary-container": "#d4aba4",
          "surface-container": "#2d1b18",
          "on-secondary-container": "#c1b8a1",
          "on-surface-variant": "#d4c3c0",
          "on-error-container": "#ffdad6",
          "surface-container-lowest": "#190a08",
          "surface-variant": "#44302c",
          "on-tertiary-fixed-variant": "#1e4e4e",
          "surface-container-low": "#281714",
          "surface-container-highest": "#44302c",
          "background": "#1f0f0c",
          "on-secondary-fixed": "#201b0c",
          "on-primary": "#442925",
          "tertiary": "#a0cfcf",
          "on-tertiary": "#003737",
          "on-surface": "#fcdbd6",
          "error-container": "#93000a",
          "primary": "#e7bdb6",
          "inverse-surface": "#fcdbd6",
          "outline": "#9d8d8b",
          "primary-fixed": "#ffdad4"
        },
        "borderRadius": {
          "DEFAULT": "0.25rem",
          "lg": "0.5rem",
          "xl": "0.75rem",
          "full": "9999px"
        },
        "spacing": {
          "md": "16px",
          "sm": "8px",
          "lg": "32px",
          "margin": "24px",
          "unit": "4px",
          "xs": "4px",
          "gutter": "16px",
          "xl": "64px"
        },
        "fontFamily": {
          "headline-lg": ["Space Grotesk"],

        },
        "fontSize": {
          "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
          "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
          "headline-md": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}],
          "label-caps": ["14px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700"}],
          "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}]
        }
      },
    },
  }
</script>
<style>
  .crt-overlay {
    background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%), linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,118,0.06));
    background-size: 100% 4px, 3px 100%;
    pointer-events: none;
  }
  .shadow-step { box-shadow: 4px 4px 0 0 #1a0f0d; }
  .active-shadow-step:active {
    transform: translate(4px, 4px);
    box-shadow: 0 0 0 0 #1a0f0d;
  }
  @keyframes pulse-opacity {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .animate-pulse-slow { animation: pulse-opacity 2s ease-in-out infinite; }

  /* Reaction box styling — JS adds reaction--visible class to show it */
  #reaction-box { display: none; }
  #reaction-box.reaction--visible { display: block; }

  .reaction { display: flex; align-items: flex-start; gap: 0.5rem; }
  .reaction-emoji { font-size: 1.5rem; flex-shrink: 0; }
  .reaction--positive .reaction-text { color: #1aff7a; }
  .reaction--neutral  .reaction-text { color: #ffcc00; }
  .reaction--negative .reaction-text { color: #ff4444; }
  .reaction-feedback { font-size: 0.8rem; opacity: 0.75; margin-top: 0.25rem; }
</style>
</head>
<body class="bg-background text-on-surface font-body-md overflow-hidden h-screen w-screen selection:bg-tertiary selection:text-on-tertiary">

<main class="relative h-screen w-screen flex flex-col items-center justify-end overflow-hidden bg-surface-dim">

  <!-- Background Office Scene -->
  <div class="absolute inset-0 z-0 opacity-40">
    <img class="w-full h-full object-cover"
         src="https://lh3.googleusercontent.com/aida/ADBb0ug9hAnJp4PhWogLWKIizmPRztoT6roLv2jxuPUexhRll1QtU_Fyn0QRwqfQmRayY7nhzwOMUueXD_o5aj3xfoX3i1oYMyicwyhGk5IwiTA9WCkVyfvR2TGdbxv7lgCTe_Ltrl61DUcsxSIVp7auDlCG2Zy7DvkmjbfT8NMV7wgSTLM-jQW4-T6z9B1CxN7CzGMuYU6hr3oRG__IGFz710n-m59aYtq0Y1vu-2Q2FRys7k_ba-qoxa4-Go_95lNIfNtcg9YyzQgTLHU"
         alt=""/>
  </div>

  <!-- CRT Overlay -->
  <div class="crt-overlay absolute inset-0 z-40"></div>

  <!-- TOP-LEFT: Stress Meter -->
  <div class="absolute top-6 left-6 flex flex-col items-center gap-3 z-50">
    <div class="flex flex-col items-center gap-1">
      <!-- stress-label: JS can update this text but we show a static label here -->
      <div id="stress-label"
        class="font-label-caps text-on-surface uppercase tracking-widest bg-surface-container border-4 border-on-surface px-3 py-1 shadow-step text-xs">
        Stress: 0%
      </div>
    </div>

    <!-- Thermometer tube — JS controls height% of stress-fill -->
    <div class="w-14 h-[72vh] bg-surface-container-lowest border-4 border-on-surface rounded-full relative p-1">
      <div
        id="stress-fill"
        class="absolute bottom-1 left-1 right-1 rounded-full border-t-2 border-white/30 transition-all duration-700"
        style="height: 0%;"
      >
        <div class="w-full h-full opacity-20 rounded-full"
          style="background: repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,255,255,0.5) 10px,rgba(255,255,255,0.5) 20px);">
        </div>
      </div>
      <!-- Bulb -->
      <div class="absolute bottom-[-18px] left-1/2 -translate-x-1/2 w-16 h-16 bg-error border-4 border-on-surface rounded-full flex items-center justify-center shadow-step">
        <span class="material-symbols-outlined text-on-error text-3xl" style="font-variation-settings: 'FILL' 1;">favorite</span>
      </div>
    </div>
  </div>

  <!-- TOP-RIGHT: Sound + Question Progress -->
  <div class="absolute top-6 right-6 flex flex-col items-end gap-3 z-50">
    <button id="sound-btn" onclick="toggleSound()"
      class="w-10 h-10 flex items-center justify-center bg-surface-container/60 border-2 border-black shadow-step active-shadow-step hover:bg-surface-container-high transition-all">
      <span id="sound-icon" class="material-symbols-outlined text-[#669BBC]">volume_up</span>
    </button>

    <!-- question-progress: JS updates q-current and q-total -->
    <div id="question-progress"
      class="font-label-caps text-on-surface uppercase tracking-widest bg-surface-container border-4 border-on-surface px-3 py-2 shadow-step text-xs text-center">
      Q <span id="q-current">1</span> / <span id="q-total">5</span>
    </div>
  </div>

  <!-- Interviewer Sprite -->
  <div class="relative z-10 mb-[-40px] md:mb-[-80px] w-full flex justify-center">
    <img
      class="h-[60vh] md:h-[75vh] object-contain"
      src="https://lh3.googleusercontent.com/aida/ADBb0ugSrTCxheO_HmShIvHYWDGshMz0XWD7sMnBclRJuij4rG9U6YswN-7sSIbIk5ac5yLoFCDKKF7UycXPX13rshVyGBn1gpWhyvR5REyNAn7PMCG8AtdzxdlYD656HipzaCeCqy12CyR9VXacrKMcGiA1ElbPTlsw_H-PoDyQ9SSgdzOHMRhy0sDTaqAk0JWFYwXHx-ip9Jk75HQD3Nau7AgvMeBaf360NwXXOmFEPHdrvdKMff5leODfaItRQTVhGTlsixAs5nLiYmU"
      alt="Interviewer"/>
  </div>

  <!-- RPG Dialogue Box (Bottom) -->
  <div class="relative z-50 w-full max-w-6xl px-margin pb-margin">
    <div class="bg-surface-container border-4 border-on-surface p-sm md:p-md shadow-step flex flex-col md:flex-row gap-md items-stretch">

      <!-- Face Cam -->
      <div class="hidden md:block flex-shrink-0">
        <div class="w-32 h-full min-h-[160px] bg-surface-container-lowest border-4 border-outline relative overflow-hidden flex flex-col">
          <img class="w-full flex-1 object-cover grayscale contrast-125"
               src="https://lh3.googleusercontent.com/aida/ADBb0ugDlvR1vyuSZB3tffgLz2e8W3fwdsdgSelNhQGRl2crgkvgj2TqfODvjOxOgJ7z0radSKrZf-amYvyGRwLa8RyMd-oTl2lbfNtBPQfyv_UVKi_ZYud8nmtK9LT4Cv4L0UctUr0W5NoLvXUZ9d9-vq2joBlYv6XH9f9MNhVk6PtIUhBjufNWPK3Z85wi6OXUG04lBkCk5dW0j3Rv4-okVN6_dFmxvxIQk_rMTjrCwcs1vPccUoKrXcX0lU-b"
               alt="Face cam"/>
          <div class="absolute top-1 left-1 flex items-center gap-1">
            <span class="w-2 h-2 bg-error rounded-full animate-ping"></span>
            <span class="text-[8px] font-label-caps text-error">REC</span>
          </div>
        </div>
      </div>

      <!-- Dialogue Content -->
      <div class="flex-grow w-full space-y-sm">

        <!-- Question box -->
        <div class="bg-surface-container-lowest p-md border-2 border-surface-variant min-h-[90px]">
          <h2 class="font-headline-md text-primary mb-2 flex items-center gap-2 text-sm">
            <span class="material-symbols-outlined text-sm">terminal</span>
            <!-- interviewer-name: JS sets this to "Strict Corporate:", "Chill Startup:", etc. -->
            <span id="interviewer-name">INTERVIEWER:</span>
          </h2>
          <!-- dialogue-text: JS streams the question text here -->
          <p id="dialogue-text" class="font-headline-md text-tertiary leading-relaxed tracking-tight">
            Preparing your interview...
          </p>
        </div>

        <!-- Reaction box — hidden until JS adds reaction--visible class -->
        <div id="reaction-box"
          class="bg-surface-container-high border-2 border-primary-container p-sm min-h-[40px]">
        </div>

        <!-- Answer input row -->
        <div class="flex items-center gap-sm bg-surface-dim border-2 border-primary-container p-sm">
          <span class="material-symbols-outlined text-tertiary px-sm">keyboard_command_key</span>
          <!-- answer-input: JS reads value and disables/enables this -->
          <input
            id="answer-input"
            class="bg-transparent border-none focus:ring-0 text-tertiary font-headline-md w-full placeholder:text-primary-container uppercase"
            placeholder="TYPE YOUR DEFENSE..."
            type="text"
          />
          <button class="flex items-center justify-center p-sm hover:bg-surface-variant text-on-surface-variant">
            <span class="material-symbols-outlined">mic</span>
          </button>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="flex-shrink-0 w-full md:w-auto flex">
        <!-- submit-answer-btn: JS wires the click handler and disables during processing -->
        <button
          id="submit-answer-btn"
          class="w-full md:h-full bg-primary text-on-primary font-headline-md px-xl py-md border-4 border-on-primary active-shadow-step shadow-step transition-all flex items-center justify-center gap-sm"
        >
          SUBMIT
          <span class="material-symbols-outlined">send</span>
        </button>
      </div>

    </div>
  </div>

  <!-- Desk overlay gradient -->
  <div class="absolute bottom-0 left-0 w-full h-24 bg-gradient-to-t from-surface-container-lowest to-transparent pointer-events-none z-20"></div>

</main>

<script>
  let soundOn = true;
  function toggleSound() {
    soundOn = !soundOn;
    document.getElementById('sound-icon').textContent = soundOn ? 'volume_up' : 'volume_off';
  }
</script>

<!-- main.js must come before ai.js and interview.js -->
<script src="assets/js/main.js"></script>
<script src="assets/js/ai.js"></script>
<script src="assets/js/interview.js"></script>
</body>
</html>
